services:
  db:
    image: postgres:17-alpine
    container_name: student-data-service-db
    environment:
      POSTGRES_DB: student_data_service
      POSTGRES_USER: student_app
      POSTGRES_PASSWORD: studentapp123
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student_app -d student_data_service"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: student-data-service-backend
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://student_app:studentapp123@db:5432/student_data_service
      FRONTEND_ORIGIN: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:3001/api
    container_name: student-data-service-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres-data:
